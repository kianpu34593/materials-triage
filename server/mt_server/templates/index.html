<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materials-Triage</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    textarea { width: 100%; box-sizing: border-box; padding: .6rem; font: inherit; }
    fieldset { border: 1px solid #8884; border-radius: 6px; margin: 1rem 0; }
    button { font: inherit; padding: .5rem 1.2rem; cursor: pointer; }
    .hint { color: #8888; font-size: .85rem; }
    .result { background: #8881; border-radius: 6px; padding: 1rem; white-space: pre-wrap; overflow-wrap: anywhere; font: 14px/1.45 ui-monospace, monospace; }
    .banner { border-radius: 6px; padding: .8rem 1rem; margin: 1rem 0; }
    .banner.refusal { background: #f5a6231a; border: 1px solid #f5a623; }
    .banner.error { background: #e74c3c1a; border: 1px solid #e74c3c; }
    .step { padding: .15rem 0; transition: opacity .2s; }
    .step .mark { display: inline-block; width: 1.4em; text-align: center; }
    .step.pending { opacity: .45; }
    .step.running { font-weight: 600; }
    .step.running .mark { animation: pulse 1s ease-in-out infinite; }
    .step.done { color: #2e9e4f; }
    @keyframes pulse { 50% { opacity: .3; } }
    #gate { border: 1px solid #6cf4; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
    #gate textarea { width: 100%; box-sizing: border-box; min-height: 16rem; font: 13px/1.45 ui-monospace, monospace; }
    #gate .actions { margin-top: .6rem; display: flex; gap: .5rem; }
    .fidelity { background: #2e9e4f14; border: 1px solid #2e9e4f88; border-radius: 6px; padding: .6rem .9rem; margin: .6rem 0; }
    .fidelity ul { margin: .4rem 0 0; padding-left: 1.2rem; }
    .fidelity li { margin: .25rem 0; font-size: .9rem; }
    .fidelity code { background: #8882; padding: .05rem .3rem; border-radius: 3px; }
    .fidelity .caveat-note { font-size: .78rem; color: #c8860088; margin-top: .15rem; }
    .rag { border: 1px solid #8884; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
    .rag h3 { margin: 0 0 .8rem; font-size: 1.05rem; }
    .stage { margin: .5rem 0; padding-left: 1.6rem; position: relative; }
    .stage::before { content: "↓"; position: absolute; left: .4rem; color: #8888; }
    .stage:first-of-type::before { content: "•"; }
    .stage .k { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #8898; }
    .stage .v { font: 13px/1.4 ui-monospace, monospace; background: #8881; border-radius: 4px; padding: .35rem .5rem; display: block; margin-top: .2rem; white-space: pre-wrap; overflow-wrap: anywhere; }
    .pill { font-size: .7rem; padding: .05rem .4rem; border-radius: 999px; border: 1px solid #8886; margin-left: .4rem; }
    .pill.gen { background: #2e9e4f22; border-color: #2e9e4f; }
    .pill.verbatim { background: #f5a62322; border-color: #f5a623; }
    .pill.miss { background: #e74c3c22; border-color: #e74c3c; }
    .psg { border-left: 3px solid #6cf; padding: .3rem .6rem; margin: .4rem 0; background: #8881; border-radius: 0 4px 4px 0; }
    .psg .t { font-weight: 600; }
    .psg .meta { font-size: .75rem; color: #8898; font-family: ui-monospace, monospace; }
    .psg .snip { font-size: .85rem; margin-top: .2rem; }
    .prop { font: 13px/1.4 ui-monospace, monospace; margin: .25rem 0; }
    .prop .cite { color: #2e9e4f; }
    details.prompt summary { cursor: pointer; font-size: .85rem; color: #8898; }
    details.prompt pre { white-space: pre-wrap; overflow-wrap: anywhere; font-size: 12px; background: #8881; padding: .6rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Materials-Triage <span class="hint">— local demo</span></h1>
  <form method="post" action="/triage">
    <label for="goal"><strong>Request</strong> (natural language)</label>
    <textarea id="goal" name="goal" rows="4" placeholder="e.g. Find me a few stable, low-density oxides with a wide band gap.">{{ goal or "" }}</textarea>
    <fieldset>
      <legend>View</legend>
      <label><input type="radio" name="view" value="pi" {{ "checked" if view != "audit" else "" }}> PI summary</label>
      <label><input type="radio" name="view" value="audit" {{ "checked" if view == "audit" else "" }}> Audit trace</label>
    </fieldset>
    <button type="submit">Run triage</button>
    <p class="hint">Runs live against AWS Bedrock + Materials Project; a request can take 10&ndash;60s.</p>
  </form>

  <!-- Live, JS-driven panes (filled by the SSE stream). -->
  <div id="progress"></div>
  <div id="ragtrace"></div>
  <div id="gate"></div>
  <div id="result"></div>

  <!-- No-JS fallback: full-page POST render. Hidden once JS takes over. -->
  <noscript>
  {% if refusal %}
  <div class="banner refusal">
    <strong>Refused [{{ refusal.category }}]</strong>: {{ refusal.reason }}
  </div>
  {% endif %}
  {% if error %}
  <div class="banner error">
    <strong>Error</strong>: {{ error }}
  </div>
  {% endif %}
  {% if result_md %}
  <h2>Result <span class="hint">({{ view }} view)</span></h2>
  <div class="result">{{ result_md }}</div>
  {% endif %}
  </noscript>

  <script>
    const STEPS = {{ steps_json|safe }};
    const form = document.querySelector("form");
    const progress = document.getElementById("progress");
    const ragtrace = document.getElementById("ragtrace");
    const gate = document.getElementById("gate");
    const result = document.getElementById("result");
    let lastGoal = "", lastView = "pi", lastGate = null;

    const el = (tag, cls, text) => {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      return n;
    };

    // Render the goal -> query -> RAG -> passages -> prompt -> proposals chain.
    const renderRagTrace = (t) => {
      const box = el("div", "rag");
      box.appendChild(el("h3", null, "Hypothesis grounding (RAG)"));

      const stage = (k, valueNode) => {
        const s = el("div", "stage");
        s.appendChild(el("div", "k", k));
        s.appendChild(valueNode);
        box.appendChild(s);
      };

      stage("1 · user goal", el("span", "v", t.goal));

      const q = el("span", "v", t.search_query);
      q.appendChild(el("span", "pill " + (t.query_generated ? "gen" : "verbatim"),
        t.query_generated ? "LLM-generated" : "goal verbatim"));
      stage("2 · search query → RAG", q);

      const psgWrap = el("div");
      if (!t.passages.length) {
        psgWrap.appendChild(el("span", "v", "(no passages retrieved)"));
      } else {
        t.passages.forEach((p) => {
          const card = el("div", "psg");
          card.appendChild(el("div", "t", "[" + p.n + "] " + (p.title || "(untitled)")));
          const meta = el("div", "meta", p.source + ":" + p.record_id + "  score=" + p.score);
          if (p.missing) meta.appendChild(el("span", "pill miss", "no abstract"));
          card.appendChild(meta);
          if (p.snippet) card.appendChild(el("div", "snip", p.snippet));
          psgWrap.appendChild(card);
        });
      }
      stage("3 · retrieved passages (response)", psgWrap);

      const det = el("details", "prompt");
      det.appendChild(el("summary", null, "4 · hypothesis prompt sent to the LLM (click to expand)"));
      det.appendChild(el("pre", null, t.hypothesis_prompt));
      const ps = el("div", "stage");
      ps.appendChild(det);
      box.appendChild(ps);

      const propWrap = el("div");
      t.proposals.forEach((pr) => {
        const line = el("div", "prop", pr.kind + ": " + pr.summary + "  ");
        if (pr.citations.length) {
          line.appendChild(el("span", "cite", "[cites " + pr.citations.join(", ") + "]"));
        } else {
          line.appendChild(el("span", "pill verbatim", "uncited"));
        }
        propWrap.appendChild(line);
      });
      stage("5 · LLM proposals (grounded + cited)", propWrap);

      ragtrace.replaceChildren(box);
    };

    const setState = (name, state) => {
      const el = document.getElementById("step-" + name);
      if (!el) return;
      el.className = "step " + state;
      el.querySelector(".mark").textContent =
        state === "done" ? "✓" : state === "running" ? "…" : "○";
    };

    const banner = (cls, strong, text) => {
      const b = document.createElement("div");
      b.className = "banner " + cls;
      if (strong) {
        const s = document.createElement("strong");
        s.textContent = strong;
        b.append(s, document.createTextNode(": "));
      }
      b.appendChild(document.createTextNode(text));
      return b;
    };

    // Render the spec-approval gate: editable JSON + Proceed / Regenerate.
    const showGate = (msg) => {
      lastGate = msg;
      setState("spec_build", "running");
      gate.replaceChildren();
      const h = document.createElement("h2");
      h.textContent = "Review the compiled spec";
      const note = document.createElement("p");
      note.className = "hint";
      note.textContent =
        (msg.note || "Approve the compiled spec, edit it, or regenerate.") +
        (msg.weights_were_normalized ? " (ranking weights were rescaled to sum to 1)" : "");

      // Fidelity gate: requirements code auto-added to match the request.
      const seeded = (msg.fidelity || []).filter((f) => f.action === "seeded");
      let fidelityBox = null;
      if (seeded.length) {
        fidelityBox = el("div", "fidelity");
        fidelityBox.appendChild(el("strong", null, "Auto-added to match your request:"));
        const ul = el("ul");
        seeded.forEach((f) => {
          const li = el("li");
          li.appendChild(el("code", null, f.detail));
          li.appendChild(document.createTextNode("  — from “" + f.cue + "”"));
          if (f.caveat) li.appendChild(el("div", "caveat-note", "⚠ " + f.caveat));
          ul.appendChild(li);
        });
        fidelityBox.appendChild(ul);
      }

      const ta = document.createElement("textarea");
      ta.spellcheck = false;
      ta.value = JSON.stringify(msg.spec, null, 2);
      const proceed = document.createElement("button");
      proceed.type = "button";
      proceed.textContent = "Proceed with this spec";
      proceed.onclick = () => {
        try { JSON.parse(ta.value); } catch (err) {
          gate.appendChild(banner("error", "Invalid JSON", String(err)));
          return;
        }
        gate.replaceChildren();
        runStream("/triage/resume?thread_id=" + encodeURIComponent(msg.thread_id) +
                  "&view=" + encodeURIComponent(lastView) +
                  "&spec=" + encodeURIComponent(ta.value));
      };
      const regen = document.createElement("button");
      regen.type = "button";
      regen.textContent = "Regenerate";
      regen.onclick = () => startRun(lastGoal, lastView);
      const actions = document.createElement("div");
      actions.className = "actions";
      actions.append(proceed, regen);
      gate.append(h, note);
      if (fidelityBox) gate.append(fidelityBox);
      gate.append(ta, actions);
    };

    const runStream = (url) => {
      const es = new EventSource(url);
      es.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "step") {
          setState(msg.name, "done");
          const i = STEPS.findIndex((s) => s.name === msg.name);
          if (STEPS[i + 1]) setState(STEPS[i + 1].name, "running");
        } else if (msg.type === "rag_trace") {
          renderRagTrace(msg.trace);
        } else if (msg.type === "spec_gate") {
          es.close();
          showGate(msg);
        } else if (msg.type === "done") {
          const hd = progress.querySelector("h2");
          if (hd) hd.textContent = "Done";
          const h = document.createElement("h2");
          h.textContent = "Result (" + msg.view + " view)";
          const pane = document.createElement("div");
          pane.className = "result";
          pane.textContent = msg.result;
          result.replaceChildren(h, pane);
          es.close();
        } else if (msg.type === "refused") {
          progress.replaceChildren(banner("refusal", "Refused [" + msg.category + "]", msg.reason));
          es.close();
        } else if (msg.type === "error") {
          es.close();
          progress.appendChild(banner("error", "Error", msg.message));
          if (msg.retry && lastGate) showGate(lastGate);  // bad edit — let them fix it
        }
      };
      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return;
        es.close();
        progress.appendChild(banner("error", null, "Connection lost before the run finished."));
      };
    };

    const startRun = (goal, view) => {
      lastGoal = goal; lastView = view; lastGate = null;
      result.replaceChildren();
      gate.replaceChildren();
      ragtrace.replaceChildren();
      progress.innerHTML =
        "<h2>Running…</h2>" +
        STEPS.map((s) =>
          `<div class="step pending" id="step-${s.name}"><span class="mark">○</span> ${s.label}</div>`
        ).join("");
      if (STEPS[0]) setState(STEPS[0].name, "running");
      runStream("/triage/stream?goal=" + encodeURIComponent(goal) +
                "&view=" + encodeURIComponent(view));
    };

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const goal = form.goal.value.trim();
      if (!goal) return;
      startRun(goal, form.querySelector("input[name=view]:checked").value);
    });
  </script>
</body>
</html>
