<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materials-Triage</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    textarea { width: 100%; box-sizing: border-box; padding: .6rem; font: inherit; }
    fieldset { border: 1px solid #8884; border-radius: 6px; margin: 1rem 0; }
    button { font: inherit; padding: .5rem 1.2rem; cursor: pointer; }
    .hint { color: #8888; font-size: .85rem; }
    .result { background: #8881; border-radius: 6px; padding: 1rem; white-space: pre-wrap; overflow-wrap: anywhere; font: 14px/1.45 ui-monospace, monospace; }
    .banner { border-radius: 6px; padding: .8rem 1rem; margin: 1rem 0; }
    .banner.refusal { background: #f5a6231a; border: 1px solid #f5a623; }
    .banner.error { background: #e74c3c1a; border: 1px solid #e74c3c; }
    .step { padding: .15rem 0; transition: opacity .2s; }
    .step .mark { display: inline-block; width: 1.4em; text-align: center; }
    .step.pending { opacity: .45; }
    .step.running { font-weight: 600; }
    .step.running .mark { animation: pulse 1s ease-in-out infinite; }
    .step.done { color: #2e9e4f; }
    @keyframes pulse { 50% { opacity: .3; } }
    #gate { border: 1px solid #6cf4; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
    #gate textarea { width: 100%; box-sizing: border-box; min-height: 16rem; font: 13px/1.45 ui-monospace, monospace; }
    #gate .actions { margin-top: .6rem; display: flex; gap: .5rem; }
  </style>
</head>
<body>
  <h1>Materials-Triage <span class="hint">— local demo</span></h1>
  <form method="post" action="/triage">
    <label for="goal"><strong>Request</strong> (natural language)</label>
    <textarea id="goal" name="goal" rows="4" placeholder="e.g. Find me a few stable, low-density oxides with a wide band gap.">{{ goal or "" }}</textarea>
    <fieldset>
      <legend>View</legend>
      <label><input type="radio" name="view" value="pi" {{ "checked" if view != "audit" else "" }}> PI summary</label>
      <label><input type="radio" name="view" value="audit" {{ "checked" if view == "audit" else "" }}> Audit trace</label>
    </fieldset>
    <button type="submit">Run triage</button>
    <p class="hint">Runs live against AWS Bedrock + Materials Project; a request can take 10&ndash;60s.</p>
  </form>

  <!-- Live, JS-driven panes (filled by the SSE stream). -->
  <div id="progress"></div>
  <div id="gate"></div>
  <div id="result"></div>

  <!-- No-JS fallback: full-page POST render. Hidden once JS takes over. -->
  <noscript>
  {% if refusal %}
  <div class="banner refusal">
    <strong>Refused [{{ refusal.category }}]</strong>: {{ refusal.reason }}
  </div>
  {% endif %}
  {% if error %}
  <div class="banner error">
    <strong>Error</strong>: {{ error }}
  </div>
  {% endif %}
  {% if result_md %}
  <h2>Result <span class="hint">({{ view }} view)</span></h2>
  <div class="result">{{ result_md }}</div>
  {% endif %}
  </noscript>

  <script>
    const STEPS = {{ steps_json|safe }};
    const form = document.querySelector("form");
    const progress = document.getElementById("progress");
    const gate = document.getElementById("gate");
    const result = document.getElementById("result");
    let lastGoal = "", lastView = "pi", lastGate = null;

    const setState = (name, state) => {
      const el = document.getElementById("step-" + name);
      if (!el) return;
      el.className = "step " + state;
      el.querySelector(".mark").textContent =
        state === "done" ? "✓" : state === "running" ? "…" : "○";
    };

    const banner = (cls, strong, text) => {
      const b = document.createElement("div");
      b.className = "banner " + cls;
      if (strong) {
        const s = document.createElement("strong");
        s.textContent = strong;
        b.append(s, document.createTextNode(": "));
      }
      b.appendChild(document.createTextNode(text));
      return b;
    };

    // Render the spec-approval gate: editable JSON + Proceed / Regenerate.
    const showGate = (msg) => {
      lastGate = msg;
      setState("spec_build", "running");
      gate.replaceChildren();
      const h = document.createElement("h2");
      h.textContent = "Review the compiled spec";
      const note = document.createElement("p");
      note.className = "hint";
      note.textContent =
        (msg.note || "Approve the compiled spec, edit it, or regenerate.") +
        (msg.weights_were_normalized ? " (ranking weights were rescaled to sum to 1)" : "");
      const ta = document.createElement("textarea");
      ta.spellcheck = false;
      ta.value = JSON.stringify(msg.spec, null, 2);
      const proceed = document.createElement("button");
      proceed.type = "button";
      proceed.textContent = "Proceed with this spec";
      proceed.onclick = () => {
        try { JSON.parse(ta.value); } catch (err) {
          gate.appendChild(banner("error", "Invalid JSON", String(err)));
          return;
        }
        gate.replaceChildren();
        runStream("/triage/resume?thread_id=" + encodeURIComponent(msg.thread_id) +
                  "&view=" + encodeURIComponent(lastView) +
                  "&spec=" + encodeURIComponent(ta.value));
      };
      const regen = document.createElement("button");
      regen.type = "button";
      regen.textContent = "Regenerate";
      regen.onclick = () => startRun(lastGoal, lastView);
      const actions = document.createElement("div");
      actions.className = "actions";
      actions.append(proceed, regen);
      gate.append(h, note, ta, actions);
    };

    const runStream = (url) => {
      const es = new EventSource(url);
      es.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "step") {
          setState(msg.name, "done");
          const i = STEPS.findIndex((s) => s.name === msg.name);
          if (STEPS[i + 1]) setState(STEPS[i + 1].name, "running");
        } else if (msg.type === "spec_gate") {
          es.close();
          showGate(msg);
        } else if (msg.type === "done") {
          const hd = progress.querySelector("h2");
          if (hd) hd.textContent = "Done";
          const h = document.createElement("h2");
          h.textContent = "Result (" + msg.view + " view)";
          const pane = document.createElement("div");
          pane.className = "result";
          pane.textContent = msg.result;
          result.replaceChildren(h, pane);
          es.close();
        } else if (msg.type === "refused") {
          progress.replaceChildren(banner("refusal", "Refused [" + msg.category + "]", msg.reason));
          es.close();
        } else if (msg.type === "error") {
          es.close();
          progress.appendChild(banner("error", "Error", msg.message));
          if (msg.retry && lastGate) showGate(lastGate);  // bad edit — let them fix it
        }
      };
      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return;
        es.close();
        progress.appendChild(banner("error", null, "Connection lost before the run finished."));
      };
    };

    const startRun = (goal, view) => {
      lastGoal = goal; lastView = view; lastGate = null;
      result.replaceChildren();
      gate.replaceChildren();
      progress.innerHTML =
        "<h2>Running…</h2>" +
        STEPS.map((s) =>
          `<div class="step pending" id="step-${s.name}"><span class="mark">○</span> ${s.label}</div>`
        ).join("");
      if (STEPS[0]) setState(STEPS[0].name, "running");
      runStream("/triage/stream?goal=" + encodeURIComponent(goal) +
                "&view=" + encodeURIComponent(view));
    };

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const goal = form.goal.value.trim();
      if (!goal) return;
      startRun(goal, form.querySelector("input[name=view]:checked").value);
    });
  </script>
</body>
</html>
